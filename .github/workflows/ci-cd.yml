name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # STAGE 1: LINT
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python — API
        run: flake8 api/main.py --max-line-length=120

      - name: Lint Python — Worker
        run: flake8 worker/worker.py --max-line-length=120

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies (includes eslint)
        run: cd frontend && npm ci

      - name: Lint JavaScript — Frontend
        run: cd frontend && npm run lint

      - name: Install hadolint
        run: |
          curl -sL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfile — API
        run: hadolint api/Dockerfile

      - name: Lint Dockerfile — Worker
        run: hadolint worker/Dockerfile

      - name: Lint Dockerfile — Frontend
        run: hadolint frontend/Dockerfile

  # ─────────────────────────────────────────────────────────────────
  # STAGE 2: TEST
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      - name: Run unit tests with coverage
        run: |
          cd api
          pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # ─────────────────────────────────────────────────────────────────
  # STAGE 3: BUILD (push to local registry service container)
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

  # ─────────────────────────────────────────────────────────────────
  # STAGE 4: SECURITY SCAN
  # ─────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      # Rebuild images so they're accessible in this job
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: localhost:5000/api:${{ github.sha }}

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: localhost:5000/worker:${{ github.sha }}

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: localhost:5000/frontend:${{ github.sha }}

      - name: Pull images for scanning
        run: |
          docker pull localhost:5000/api:${{ github.sha }}
          docker pull localhost:5000/worker:${{ github.sha }}
          docker pull localhost:5000/frontend:${{ github.sha }}

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Scan Frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ─────────────────────────────────────────────────────────────────
  # STAGE 5: INTEGRATION TEST
  # ─────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file for compose
        run: |
          echo "REDIS_PASSWORD=testpassword" > .env
          echo "APP_ENV=production" >> .env

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 30); do
            FRONTEND=$(docker compose ps frontend --format json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health',''))" 2>/dev/null || echo "")
            API=$(docker compose ps api --format json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health',''))" 2>/dev/null || echo "")
            echo "Attempt $i: frontend=$FRONTEND api=$API"
            if [ "$FRONTEND" = "healthy" ] && [ "$API" = "healthy" ]; then
              echo "All services healthy!"
              break
            fi
            sleep 5
          done

      - name: Submit a job via frontend
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          echo "Submit response: $RESPONSE"
          JOB_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV
          echo "Got job ID: $JOB_ID"

      - name: Poll until job completes (max 60s)
        run: |
          JOB_ID=${{ env.JOB_ID }}
          for i in $(seq 1 12); do
            STATUS_RESP=$(curl -s http://localhost:3000/status/$JOB_ID)
            echo "Poll $i: $STATUS_RESP"
            STATUS=$(echo $STATUS_RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
            sleep 5
          done
          echo "Job did not complete in time!"
          exit 1

      - name: Tear down stack (always runs)
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────────────────────────
  # STAGE 6: DEPLOY (main branch only, rolling update)
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for deploy
        run: |
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" > .env
          echo "APP_ENV=production" >> .env

      - name: Perform rolling update
        run: |
          set -e
          SHA=${{ github.sha }}

          echo "=== Rolling update: API ==="
          docker compose build api
          docker compose up -d --no-deps api

          # Wait up to 60s for API health check
          TIMEOUT=60
          ELAPSED=0
          until [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q api))" = "healthy" ]; do
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "API health check failed after ${TIMEOUT}s — aborting, old container preserved"
              docker compose up -d --no-deps --scale api=0 || true
              exit 1
            fi
            echo "Waiting for API... (${ELAPSED}s)"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          echo "API is healthy."

          echo "=== Rolling update: Worker ==="
          docker compose build worker
          docker compose up -d --no-deps worker
          echo "Worker updated."

          echo "=== Rolling update: Frontend ==="
          docker compose build frontend
          docker compose up -d --no-deps frontend

          ELAPSED=0
          until [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q frontend))" = "healthy" ]; do
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "Frontend health check failed — aborting"
              exit 1
            fi
            echo "Waiting for Frontend... (${ELAPSED}s)"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          echo "Frontend is healthy. Deploy complete."